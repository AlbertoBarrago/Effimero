<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effimero Test Site</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; }
    nav a, nav button { margin-right: 1rem; }
    .note { color: #666; font-size: 0.9rem; }
  </style>
  <script src="http://localhost:3000/effimero.js" data-site="my-site" defer></script>
</head>
<body>
  <h1 id="title">Home</h1>
  <p>Each navigation below fires a pageview beacon to Effimero — MPA links reload the page, SPA buttons use pushState.</p>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/about.html">About (MPA)</a>
    <a href="/pricing.html">Pricing (MPA)</a>
    <button onclick="go('/spa/features')">Features (SPA)</button>
    <button onclick="go('/spa/docs')">Docs (SPA)</button>
    <button onclick="history.back()">← Back (popstate)</button>
  </nav>
  <p class="note">Open the cockpit at <a href="http://localhost:3000">localhost:3000</a> and watch the hits land.</p>
  <script>
    function go(path) {
      history.pushState({}, "", path);
      document.getElementById("title").textContent = path;
    }
  </script>
</body>
</html>
